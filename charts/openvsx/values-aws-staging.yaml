# Default values for openvsx eks staging.

name: &name open-vsx-org
environment: &environment staging
namespace: &namespace open-vsx-org-staging

replicaCount: 1
esReplicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

image:
  repository: ghcr.io/eclipsefdn/openvsx-website
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: 6d777ca-570

eks:
  enabled: true  # Switch to false for OKD installations

aws-load-balancer-controller:
  clusterName: eks-staging
  region: eu-central-1
  vpcId: vpc-0285cbfe9bfb7e4fd
  serviceAccount:
    create: false
    name: aws-load-balancer-controller-staging

ingress:
  certArn: arn:aws:acm:eu-central-1:365555376529:certificate/c247a8c7-31fa-4116-bd4a-c1e5aebad840

cloudfront:
  cidr: pl-a3a144ca

website:
  jvmArgs: >
    -Dspring.datasource.hikari.maximum-pool-size=5
    -Xms512M -Xmx3500M
    -XX:+AlwaysPreTouch
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+UseStringDeduplication
    -XX:+ParallelRefProcEnabled
    -XX:+DisableExplicitGC
    -XX:+UnlockExperimentalVMOptions
    -XX:+UnlockDiagnosticVMOptions
    -Dlog4j2.formatMsgNoLookups=true
    -Dlog4j.formatMsgNoLookups=true
    -Dorg.jooq.no-logo=true
    -Dorg.jooq.no-tips=true
    --enable-native-access=ALL-UNNAMED

route:
  timeout: 30s

resources:
  limits:
    cpu: 5000m
    memory: 8Gi
  requests:
    cpu: 3000m
    memory: 8Gi

# elastic search
es:
  java_opts: -Xms1g -Xmx1g -Dlog4j2.formatMsgNoLookups=true
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 2Gi
  storage_class: gp3

postgresql-ha: 
  postgresql:
    image:
      repository: bitnamilegacy/postgresql-repmgr
      tag: 17.6.0-debian-12-r2
    database: openvsx-staging
    createDatabase: true
    enablePostgresUser: true
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  pgpool:
    image:
      repository: bitnamilegacy/pgpool
      tag: 4.6.3-debian-12-r0
    enabled: true

# redis
redis:
  maxmemory: "256mb"
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "100m"
  persistence:
    storageGi: 1
    storageClass: "gp3"
  serviceAccountName: redis-cluster-operator-staging
  clusterRoleName: redis-cluster-operator-role-cluster-staging
  clusterRoleBindingName:  redis-cluster-operator-role-binding-cluster-staging
  roleName: redis-cluster-operator-role-staging
  roleBinding: redis-cluster-operator-role-binding-staging

# grafana alloy
alloy:
  alloy:
    configMap:
      create: false
      name: "grafana-alloy-configmap-staging"
      key: "config.river"
    envFrom:
      - secretRef: 
          name: grafana-cloud-secret-staging
      - secretRef: 
          name: redis-secret-staging
  crds:
    create: true
  controller:
    type: "daemonset"
    podLabels:
      app: *name
      environment: *environment
    nodeSelector:
      openvsx-production-alloy: null
  fullnameOverride: grafana-alloy-staging
  namespaceOverride: *namespace

clamav:
  enabled: false

yara:
  enabled: false
