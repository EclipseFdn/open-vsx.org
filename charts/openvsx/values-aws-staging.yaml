# Default values for openvsx eks staging.

name: &name open-vsx-org
environment: &environment staging
namespace: &namespace open-vsx-org-staging
host: premium-staging.open-vsx.org

replicaCount: 1
esReplicaCount: 1

image:
  repository: ghcr.io/eclipsefdn/openvsx-website
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: 6d777ca-570

eks:
  enabled: true  # Switch to false for OKD installations

aws-load-balancer-controller:
  clusterName: eks-staging
  region: eu-central-1
  vpcId: vpc-0285cbfe9bfb7e4fd
  serviceAccount:
    create: false
    name: aws-load-balancer-controller-staging

external-dns:
  provider:
    name: aws
  serviceAccount:
    create: false
    name: external-dns-staging
  txtOwnerId: eks-staging
  extraArgs:
    - --source=ingress
    - --aws-zone-type=public
    - --domain-filter=open-vsx.org

ingress:
  wafv2Arn: "arn:aws:wafv2:eu-central-1:365555376529:regional/webacl/ALB-Redirect-ACL/1224443f-4a6a-46ef-a2b8-3c19184567a7"

website:
  jvmArgs: >
    -Dspring.datasource.hikari.maximum-pool-size=5
    -Xms512M -Xmx3500M
    -XX:+AlwaysPreTouch
    -XX:+HeapDumpOnOutOfMemoryError
    -XX:+UseStringDeduplication
    -XX:+ParallelRefProcEnabled
    -XX:+DisableExplicitGC
    -XX:+UnlockExperimentalVMOptions
    -XX:+UnlockDiagnosticVMOptions
    -Dlog4j2.formatMsgNoLookups=true
    -Dlog4j.formatMsgNoLookups=true
    -Dorg.jooq.no-logo=true
    -Dorg.jooq.no-tips=true
    --enable-native-access=ALL-UNNAMED

route:
  timeout: 30s

resources:
  limits:
    cpu: 4
    memory: 4Gi
  requests:
    cpu: 2
    memory: 2Gi

# elastic search
es:
  java_opts: -Xms1g -Xmx1g -Dlog4j2.formatMsgNoLookups=true
  resources:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 2Gi

postgresql:
  architecture: standalone
  auth:
    createDatabase: true
    database: openvsx-staging
    enablePostgresUser: true

# redis
redis:
  maxmemory: "256mb"
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "512Mi"
      cpu: "100m"
  persistence:
    storageGi: 1
  serviceAccountName: redis-cluster-operator-staging
  clusterRoleName: redis-cluster-operator-role-cluster-staging
  clusterRoleBindingName:  redis-cluster-operator-role-binding-cluster-staging
  roleName: redis-cluster-operator-role-staging
  roleBinding: redis-cluster-operator-role-binding-staging

# grafana alloy
alloy:
  alloy:
    configMap:
      create: false
      name: "grafana-alloy-configmap-staging"
      key: "config.river"
    envFrom:
      - secretRef: 
          name: grafana-cloud-secret-staging
      - secretRef: 
          name: redis-secret-staging
  crds:
    create: true
  controller:
    type: "daemonset"
    podLabels:
      app: *name
      environment: *environment
    nodeSelector:
      openvsx-staging-alloy: "true"
      openvsx-production-alloy: null
  fullnameOverride: grafana-alloy-staging
  namespaceOverride: *namespace

clamav:
  enabled: true

yara:
  enabled: true
